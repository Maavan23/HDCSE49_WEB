<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">Navbar</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNavAltMarkup">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="#">Home</a>
                    <a class="nav-link" href="#">Features</a>
                    <a class="nav-link" href="#">Pricing</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <!-- Background Video -->
        <video autoplay loop muted playsinline class="big-video">
            <source src="./assets/videos/video.mp4" type="video/mp4">
        </video>

        <!-- Overlay (dark effect) -->
        <div class="overlay"></div>

        <div class="container">
            <div class="row align-items-center">

                <!-- Left Content -->
                <div class="col-lg-6 text-white">
                    <h5>Hi, I'm Sasindu Kaveesha</h5>
                    <h1 class="display-4 fw-bold">Freelancer</h1>
                    <p class="mb-4">
                        I love Graphic Design and Photography and have been working on my portfolio since 2016.
                    </p>
                    <a href="#contact" class="btn btn-success me-2">Hire Me</a>
                    <a href="#projects" class="btn btn-outline-light">My Portfolio</a>
                </div>

                <!-- Right Image -->
                <div class="col-lg-6 text-center">
                    <img src="indian-software-engineer-working-his-laptop.jpg"
                        class="rounded-circle shadow-lg img-fluid"
                        style="max-width: 250px;">
                </div>

            </div>
        </div>

    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

</body>

</html>
